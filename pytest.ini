[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -ra
    --html=reports/pytest-report.html
    --self-contained-html
    --junitxml=reports/pytest-junit.xml
    --alluredir=reports/allure-results
    --clean-alluredir
markers =
    smoke: fast checks and environment sanity
    regression: full regression scenarios
    contacts: contact module tests
    leads: lead module tests
    tasks: task module tests
    credit_request: credit request panel tests
    applications: create application tests
    contracts: create contract tests
