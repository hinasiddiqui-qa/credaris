# Copy to config/config.properties for local runs, or let Jenkins generate it from secrets.
# Do not commit config/config.properties — it contains credentials.

# URLs
auth.base.url=https://zpa-ba.credaris.ch
auth.home.path=/#/home
application.url=https://sugar-test.intern.credaris.ch
application.host=sugar-test.intern.credaris.ch
application.login.path=/#/Login
microsoft.login.url=https://login.microsoftonline.com

# Microsoft SSO credentials (ZPA / Entra ID)
microsoft.username=your.user@credaris.onmicrosoft.com
microsoft.password=your-microsoft-password

# Sugar CRM application credentials
sugar.username=your-sugar-username
sugar.password=your-sugar-password

# Browser
browser=chrome
headless=false
reuse.session=true
skip.microsoft.login=false
chrome.user.data.dir=.chrome-profile/credaris-automation
chrome.profile.directory=Default

# Timeouts (seconds)
implicit.wait=0
explicit.wait=15
quick.poll.timeout=2
sugar.load.timeout=60
mfa.wait.timeout=600

# Reporting / runtime
screenshot.on.failure=true
log.level=INFO
keep.browser.open=false
